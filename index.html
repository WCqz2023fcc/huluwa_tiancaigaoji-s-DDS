<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>葫芦侠公益</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* 背景图设置 */
body{
  font-family:system-ui,sans-serif;
  background:#f7f8fa url('./bg.jpg') no-repeat center center fixed;
  background-size:cover;
  padding:0 0 40px;
}

/* 核心样式：毛玻璃 + 60% 透明 */
.glass-card{
  background:rgba(255, 255, 255, 0.6); /* 白色透明 60% */
  backdrop-filter:blur(10px); /* 毛玻璃核心 */
  -webkit-backdrop-filter:blur(10px); /* 兼容手机 */
  border-radius:16px;
  box-shadow:0 4px 12px rgba(31, 38, 135, 0.1); /* 柔和阴影 */
  border:1px solid rgba(255, 255, 255, 0.8); /* 轻微边框增强质感 */
}

/* 标题头：毛玻璃透明 */
.head{
  text-align:center;
  padding:16px;
  margin:20px auto;
  border-radius:12px;
  max-width:300px;
  background:rgba(255, 255, 255, 0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.head h1{font-size:20px;color:#009900}

.container{max-width:900px;margin:0 auto;padding:0 14px}

/* 内容卡片：使用毛玻璃类 */
#content .card{
  padding:22px;
  margin:20px 0;
}

/* 下载列表卡片：使用毛玻璃类 */
#files{
  padding:22px;
  margin:20px 0;
}

/* 表格样式：透明化 */
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  background:rgba(255, 255, 255, 0.5);
}
th{
  background:rgba(245, 247, 250, 0.7);
  padding:10px 12px;
  text-align:left;
  border:1px solid rgba(229, 231, 235, 0.8);
  font-weight:600;
  color:#333;
}
td{
  padding:10px 12px;
  border:1px solid rgba(229, 231, 235, 0.8);
  color:#444;
  background:rgba(255, 255, 255, 0.4);
}
a{color:#0066cc;text-decoration:none}
a:hover{text-decoration:underline}
.empty-tip{text-align:center;padding:20px;color:#666;font-size:14px}
</style>
</head>
<body>

<div class="head"><h1>葫芦侠公益</h1></div>
<div class="container">
  <!-- 内容卡片：空内容不渲染 -->
  <div id="content"></div>
  <!-- 下载列表卡片：毛玻璃外壳 -->
  <div id="files" class="glass-card"></div>
</div>

<script>
const gist = "https://gist.githubusercontent.com/WCqz2023fcc/1ef4d08e0c9d566cbbed18354b2400a2/raw/";

function md(s){
  return s
    .replace(/# (.*)/g,"<h2>$1</h2>")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>")
}

async function load(){
  // 1. 加载主页内容
  let c = await fetch(gist+"main.json").then(r=>r.json());
  const contentEl = document.getElementById("content");
  const contentText = c.content || "";
  
  if(contentText.trim() !== ""){
    const card = document.createElement("div");
    card.className = "card glass-card"; // 加入毛玻璃类
    card.innerHTML = md(contentText);
    contentEl.appendChild(card);
  }

  // 2. 加载下载列表
  let d = await fetch(gist+"download.json").then(r=>r.json());
  let list = d.list||[];
  const filesEl = document.getElementById("files");
  
  let html = `
  <table>
    <thead>
      <tr>
        <th>文件名</th>
        <th>版本</th>
        <th>介绍</th>
      </tr>
    </thead>
    <tbody>
  `;
  
  if(list.length === 0){
    html += `<tr><td colspan="3" class="empty-tip">暂无下载文件</td></tr>`;
  }else{
    list.forEach(i=>{
      html+=`
      <tr>
        <td><a href="./exe/${i.文件名}" target="_blank">${i.文件名}</a></td>
        <td>${i.版本}</td>
        <td>${i.介绍}</td>
      </tr>`;
    });
  }
  
  html += `</tbody></table>`;
  filesEl.innerHTML = html;
}
load();
</script>
</body>
</html>
