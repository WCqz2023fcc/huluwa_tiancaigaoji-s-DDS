name: 推送新文件自动触发页面同步
# 核心：只要往main分支推送新文件/修改文件，就自动运行
on:
  push:
    branches: [ main ]

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 给页面仓库发同步信号
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -X POST \
            -f -s -L \
            -H "Authorization: token $PAT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/WCqz2023fcc/huluwa_tiancaigaoji-s-DDS/dispatches \
            -d '{"event_type":"file_repo_updated"}'

