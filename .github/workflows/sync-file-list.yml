name: 自动同步文件仓库列表
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/2 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 拉取文件并生成列表
        run: |
          python3 << 'EOF'
          import json
          import requests

          # 你的文件仓库信息，一字不差
          USER = "WCqz2023fcc"
          REPO = "huluxia_tiancaigaoji-s_cangku"
          BRANCH = "main"

          # 拉取文件仓库目录
          try:
              url = f"https://api.github.com/repos/{USER}/{REPO}/git/trees/{BRANCH}?recursive=1"
              res = requests.get(url, timeout=10)
              res.raise_for_status()
              data = res.json()
          except Exception as e:
              print(f"❌ 拉取文件仓库失败: {e}")
              exit(1)

          # 生成文件列表
          file_list = []
          for item in data.get("tree", []):
              if item["type"] != "blob":
                  continue
              path = item["path"]
              # 拆分分类和文件名
              if "/" in path:
                  name = path.split("/")[-1]
                  category = "/".join(path.split("/")[:-1])
              else:
                  name = path
                  category = ""
              # 生成下载直链
              download_url = f"https://raw.githubusercontent.com/{USER}/{REPO}/{BRANCH}/{path}"
              file_list.append({
                  "name": name,
                  "path": path,
                  "category": category,
                  "downloadUrl": download_url
              })

          # 写入文件
          with open("file_list.json", "w", encoding="utf-8") as f:
              json.dump(file_list, f, ensure_ascii=False, indent=2)
          
          print(f"✅ 同步成功！共获取到 {len(file_list)} 个文件")
          EOF

      - name: 提交更新到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add file_list.json
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "✅ 无文件变更，跳过提交"
            exit 0
          fi
          git commit -m "自动同步文件列表"
          git push
