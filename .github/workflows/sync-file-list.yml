name: 自动同步文件仓库列表
on:
  # 每30分钟自动扫一次文件仓库，更新列表
  schedule:
    - cron: '*/30 * * * *'
  # 手动触发也可以
  workflow_dispatch:
  # 页面仓库提交代码时也同步一次
  push:
    branches: [ main, master ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出页面仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FILE_REPO_TOKEN }}

      - name: 扫描文件仓库，生成文件列表
        env:
          TOKEN: ${{ secrets.FILE_REPO_TOKEN }}
          FILE_REPO: WCqz2023fcc/huluxia_tiancaigaoji-s_cangku
        run: |
          # 拉取文件仓库完整目录树
          curl -H "Authorization: token $TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/$FILE_REPO/git/trees/main?recursive=1" > tree.json
          
          # 生成标准化文件列表JSON
          echo "[" > file_list.json
          jq -r '.tree[] | select(.type == "blob") | @base64' tree.json | while read -r line; do
            item=$(echo "$line" | base64 -d)
            path=$(echo "$item" | jq -r '.path')
            name=$(basename "$path")
            category=$(dirname "$path" | sed 's/^\.$//')
            downloadUrl="https://raw.githubusercontent.com/$FILE_REPO/main/$path"
            echo "{\"name\":\"$name\",\"path\":\"$path\",\"category\":\"$category\",\"downloadUrl\":\"$downloadUrl\"}," >> file_list.json
          done
          sed -i '$ s/,$//' file_list.json
          echo "]" >> file_list.json

          # 清理临时文件
          rm -f tree.json

      - name: 提交更新到页面仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add file_list.json
          git commit -m "自动同步文件仓库列表" || exit 0
          git push
