name: 自动同步文件仓库列表
# 触发规则：手动触发、页面仓库提交、文件仓库推送新文件时自动触发
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  # 核心：接收文件仓库的触发信号
  repository_dispatch:
    types: [file_repo_updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出页面仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FILE_REPO_TOKEN }}

      - name: 拉取文件仓库并生成列表
        env:
          TOKEN: ${{ secrets.FILE_REPO_TOKEN }}
          FILE_REPO: "WCqz2023fcc/huluxia_tiancaigaoji-s_cangku"
          BRANCH: "main"
        run: |
          # 稳定拉取文件列表，加错误处理
          curl -f -s -L \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$FILE_REPO/contents?ref=$BRANCH&recursive=1" > raw.json

          # 拉取失败直接报错终止
          if [ ! -s raw.json ]; then
            echo "❌ 拉取文件仓库失败，请检查Token权限和仓库名"
            exit 1
          fi

          # 生成标准JSON文件列表
          echo "[" > file_list.json
          jq -r '.[] | select(.type == "file") | @base64' raw.json | while read -r line; do
            f=$(echo "$line" | base64 -d)
            path=$(echo "$f" | jq -r '.path')
            name=$(echo "$f" | jq -r '.name')
            cat=$(dirname "$path" | sed 's/^\.$//')
            url=$(echo "$f" | jq -r '.download_url')
            echo "{\"name\":\"$name\",\"path\":\"$path\",\"category\":\"$cat\",\"downloadUrl\":\"$url\"}," >> file_list.json
          done

          # 修复JSON格式，避免语法错误
          sed -i '$ s/,$//' file_list.json
          echo "]" >> file_list.json

          # 清理临时文件
          rm -f raw.json

      - name: 提交更新到页面仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add file_list.json
          # 无更新时不报错，正常结束
          git commit -m "自动同步文件列表" || echo "✅ 无文件变更，跳过提交"
          git push
