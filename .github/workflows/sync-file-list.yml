name: 自动同步文件仓库列表
on:
  # 手动触发
  workflow_dispatch:
  # 页面仓库提交时自动同步
  push:
    branches: [ main ]
  # 每2分钟自动同步一次，足够用了
  schedule:
    - cron: '*/2 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出页面仓库
        uses: actions/checkout@v4

      - name: 拉取文件仓库内容（公开仓库零权限版）
        run: |
          python3 << 'EOF'
          import json
          import requests

          # 你的文件仓库信息，一字不差
          USER = "WCqz2023fcc"
          REPO = "huluxia_tiancaigaoji-s_cangku"
          BRANCH = "main"

          # 公开仓库直接拉取，不用Token，零报错
          url = f"https://api.github.com/repos/{USER}/{REPO}/git/trees/{BRANCH}?recursive=1"
          res = requests.get(url)
          res.raise_for_status()
          data = res.json()

          # 生成文件列表
          file_list = []
          for item in data.get("tree", []):
              if item["type"] != "blob":
                  continue
              path = item["path"]
              if "/" in path:
                  name = path.split("/")[-1]
                  category = "/".join(path.split("/")[:-1])
              else:
                  name = path
                  category = ""
              download_url = f"https://raw.githubusercontent.com/{USER}/{REPO}/{BRANCH}/{path}"
              file_list.append({
                  "name": name,
                  "path": path,
                  "category": category,
                  "downloadUrl": download_url
              })

          # 写入文件
          with open("file_list.json", "w", encoding="utf-8") as f:
              json.dump(file_list, f, ensure_ascii=False, indent=2)
          
          print(f"✅ 同步成功，共获取到 {len(file_list)} 个文件")
          EOF

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add file_list.json
          git commit -m "同步文件列表" || echo "无更新，跳过提交"
          git push
